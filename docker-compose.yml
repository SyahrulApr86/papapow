services:
  postgres:
    image: postgres:16-alpine
    container_name: papapow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: papapow
      POSTGRES_USER: papapow
      POSTGRES_PASSWORD: papapow
    ports:
      - "55432:5432"
    volumes:
      - papapow-postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papapow -d papapow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  papapow-postgres-data:
